services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_API: ${NEXT_PUBLIC_API}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API=${API}
    expose:
      - "3000"
    networks:
      - app_net

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - app_net

volumes:
  npm_data:
  npm_letsencrypt:

networks:
  app_net:
